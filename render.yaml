services:
  - type: web
    name: innovx-ai-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    branch: main
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: innovx-ai-frontend
          property: url
      - key: FLASK_ENV
        value: production

  - type: web
    name: innovx-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    branch: main
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: innovx-ai-backend
          property: url
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: innovx-ai-backend
          property: url
